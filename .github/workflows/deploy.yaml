name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build images
      run: docker compose build

    - name: Smoke test
      run: |
        docker compose up -d
        sleep 20
        curl -f http://localhost
        curl -f http://localhost:5000/api

    - name: Deploy
      run: echo "Deploy successful"

    - name: Rollback if failed
      if: failure()
      run: echo "Rollback triggered"